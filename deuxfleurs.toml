[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/actualites/2024-10-13-octobre-2024/"
to = "/actualites/2024-10-13-cours-10-2024/"

[[redirects]]
from = "/presentation/"
to = "/lassociation/presentation/"

[[redirects]]
from = "/lassociation/cours-de-jardinage-biologique-gratuits/"
to = "/lassociation/cours-de-jardinage-biologique/"

